apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "re-rotas.fullname" . }}
  labels:
    {{- include "re-rotas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "re-rotas.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "re-rotas.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              until ruby -rsocket -e 'TCPSocket.new(ENV.fetch("DB_HOST"), ENV.fetch("DB_PORT").to_i).close'; do
                echo "waiting for database"
                sleep 2
              done
              bundle exec rails db:prepare
              exec bundle exec rails server -b 0.0.0.0 -p "${PORT}" -e production
          env:
            - name: RAILS_ENV
              value: production
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: DB_PASSWORD
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: DB_NAME
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: DATABASE_URL
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: SECRET_KEY_BASE
            - name: CALENDAR_URL_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: CALENDAR_URL_SALT
            - name: GOOGLE_AUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: GOOGLE_AUTH_CLIENT_ID
            - name: GOOGLE_AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: GOOGLE_AUTH_CLIENT_SECRET
            - name: PAGERDUTY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: PAGERDUTY_API_KEY
            - name: RAILS_MAX_THREADS
              value: {{ .Values.app.railsMaxThreads | quote }}
            - name: RAILS_LOG_LEVEL
              value: {{ .Values.app.railsLogLevel | quote }}
            {{- if .Values.app.disableAuth }}
            - name: DISABLE_AUTH
              value: "1"
            {{- end }}
            {{- range .Values.app.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /version
              port: http
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /version
              port: http
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /version
              port: http
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          volumeMounts:
            - name: tmp
              mountPath: /home/app/tmp
            - name: storage
              mountPath: /home/app/storage
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
        {{- if .Values.postgres.enabled }}
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "re-rotas.secretName" . }}
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: storage
          {{- if .Values.persistence.appStorage.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "re-rotas.appStoragePvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.postgres.enabled }}
        - name: postgres-data
          {{- if .Values.postgres.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "re-rotas.postgresPvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
