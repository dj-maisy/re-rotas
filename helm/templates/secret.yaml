{{- $dbHost := "127.0.0.1" -}}
{{- $dbPort := "5432" -}}
{{- $dbUser := .Values.postgres.auth.username -}}
{{- $dbPassword := .Values.postgres.auth.password -}}
{{- $dbName := .Values.postgres.auth.database -}}
{{- if not .Values.postgres.enabled -}}
{{- $dbHost = .Values.externalDatabase.host -}}
{{- $dbPort = toString .Values.externalDatabase.port -}}
{{- $dbUser = .Values.externalDatabase.username -}}
{{- $dbPassword = .Values.externalDatabase.password -}}
{{- $dbName = .Values.externalDatabase.database -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "re-rotas.secretName" . }}
  labels:
    {{- include "re-rotas.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY_BASE: {{ .Values.app.secretKeyBase | quote }}
  CALENDAR_URL_SALT: {{ .Values.app.calendarUrlSalt | quote }}
  GOOGLE_AUTH_CLIENT_ID: {{ .Values.app.googleAuthClientId | quote }}
  GOOGLE_AUTH_CLIENT_SECRET: {{ .Values.app.googleAuthClientSecret | quote }}
  PAGERDUTY_API_KEY: {{ .Values.app.pagerDutyApiKey | quote }}
  DB_HOST: {{ $dbHost | quote }}
  DB_PORT: {{ $dbPort | quote }}
  DB_USER: {{ $dbUser | quote }}
  DB_PASSWORD: {{ $dbPassword | quote }}
  DB_NAME: {{ $dbName | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%s/%s" $dbUser $dbPassword $dbHost $dbPort $dbName | quote }}
  POSTGRES_USER: {{ .Values.postgres.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}
